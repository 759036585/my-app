name: 🚀 CI/CD — React + Node.js

on:
  push:
    branches: [master, test]
  pull_request:
    branches: [master, test]

env:
  NODE_VERSION: '18'

jobs:
  # ─────────────────────────────────────────
  # JOB 1: 测试
  # ─────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci

      - name: Install backend deps
        working-directory: ./backend
        run: npm ci

      - name: Backend tests
        working-directory: ./backend
        run: npm test

  # ─────────────────────────────────────────
  # JOB 2: 构建前端
  # ─────────────────────────────────────────
  build:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          CI: false

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 3: 部署
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      # 上传前端文件到服务器
      - name: Upload frontend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: 'frontend/dist/*'
          target: '/var/www/html/'
          strip_components: 2

      # SSH 部署后端（从 GitHub 拉取）
      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /home/www/my-app

            echo "📥 从 GitHub 拉取最新代码..."
            git remote set-url origin git@github.com:759036585/my-app.git
            git pull origin master

            echo "📦 安装后端依赖..."
            cd backend && npm ci --omit=dev

            echo "🔐 写入环境变量..."
            cat > .env << ENVEOF
            NODE_ENV=production
            PORT=${{ secrets.APP_PORT }}
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            QIANFAN_BASE_URL=${{ secrets.QIANFAN_BASE_URL }}
            QIANFAN_API_KEY=${{ secrets.QIANFAN_API_KEY }}
            ENVEOF

            echo "🔄 重启 PM2 服务..."
            pm2 reload my-app-backend --update-env 2>/dev/null || \
            pm2 start app.js --name my-app-backend

            pm2 save
            echo "✅ 部署完成！"
            pm2 status