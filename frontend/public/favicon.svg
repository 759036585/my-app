<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- AI科技风格渐变 -->
  <defs>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="circuitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.8" />
    </linearGradient>
    <filter id="aiGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- 深色科技背景 -->
  <rect width="128" height="128" fill="#0F172A" />
  
  <!-- 神经网络节点网络 -->
  <g stroke="url(#circuitGradient)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7">
    <!-- 主电路连线 -->
    <path d="M 32,48 L 48,32 L 80,64 L 96,80 L 112,64" />
    <path d="M 32,80 L 48,96 L 80,64 L 96,48 L 112,64" />
    <path d="M 64,32 L 64,96" />
    <path d="M 32,64 L 96,64" />
    
    <!-- 交叉连接 -->
    <path d="M 48,48 L 80,80" />
    <path d="M 48,80 L 80,48" />
  </g>
  
  <!-- 神经网络节点 -->
  <g fill="url(#aiGradient)" filter="url(#aiGlow)">
    <!-- 中心主节点 -->
    <circle cx="64" cy="64" r="20" />
    
    <!-- 周围节点 -->
    <circle cx="32" cy="48" r="8" />
    <circle cx="48" cy="32" r="8" />
    <circle cx="80" cy="32" r="8" />
    <circle cx="96" cy="48" r="8" />
    
    <circle cx="32" cy="80" r="8" />
    <circle cx="48" cy="96" r="8" />
    <circle cx="80" cy="96" r="8" />
    <circle cx="96" cy="80" r="8" />
    
    <circle cx="112" cy="64" r="8" />
  </g>
  
  <!-- 二进制数据流装饰 -->
  <g font-family="monospace" font-size="6" fill="white" opacity="0.3">
    <text x="20" y="20">1010</text>
    <text x="100" y="20">1101</text>
    <text x="20" y="110">0110</text>
    <text x="100" y="110">1001</text>
  </g>
  
  <!-- AI文字标识 -->
  <text x="64" y="68" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="12" fill="white" opacity="0.9">AI</text>
  
  <!-- 外发光效果 -->
  <circle cx="64" cy="64" r="62" fill="none" stroke="url(#aiGradient)" stroke-width="1" opacity="0.4" />
</svg>